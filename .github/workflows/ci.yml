name: Build and publish EShop microservices

on:
  push:
    branches: [ dev*, main ]
  pull_request:
    branches: [ main ]
    paths:
      - src/**
      - Dockerfile
      - .github/workflows/**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Authenticate GitHub NuGet
      run: dotnet nuget update source github-ekstrem --username Ekstrem --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile src/nuget.config

    - name: Restore dependencies
      run: dotnet restore EShop.sln

    - name: Build
      run: dotnet build EShop.sln --no-restore --configuration Release

    - name: Test Domain
      run: |
        dotnet test src/Review/Review.Domain.Tests/Review.Domain.Tests.csproj --no-build --configuration Release --verbosity normal
        dotnet test src/Shipment/Shipment.Domain.Tests/Shipment.Domain.Tests.csproj --no-build --configuration Release --verbosity normal
        dotnet test src/ReturnRequest/ReturnRequest.Domain.Tests/ReturnRequest.Domain.Tests.csproj --no-build --configuration Release --verbosity normal
        dotnet test src/AggregateRating/AggregateRating.Domain.Tests/AggregateRating.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

    - name: Test Integration
      run: dotnet test src/EShop.IntegrationTests/EShop.IntegrationTests.csproj --no-build --configuration Release --verbosity normal

  docker:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
